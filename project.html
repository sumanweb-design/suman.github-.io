<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects - Suman</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CONTAINER */
.container{
  padding:80px 20px;
  text-align:center;
}

h1{
  font-size:2.5rem;
  margin-bottom:30px;
  background:linear-gradient(90deg,#ff0000,#0066ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
}

/* IMAGE */
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:15px;
}

/* TAGS */
.tag{
  display:inline-block;
  padding:5px 10px;
  margin:3px;
  font-size:12px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
}

/* BUTTON */
button{
  margin-top:10px;
  padding:8px 18px;
  border-radius:20px;
  border:none;
  background:linear-gradient(90deg,#ff0000,#0066ff);
  color:white;
  cursor:pointer;
}

/* BACK */
.back{
  margin-top:40px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>My Projects</h1>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <div class="content">
        <h3>Portfolio Website</h3>
        <p>Modern animated website</p>

        <span class="tag">HTML</span>
        <span class="tag">CSS</span>
        <span class="tag">JS</span>

        <br>
        <button onclick="openLink('https://example.com')">View</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <div class="content">
        <h3>Minecraft Panel</h3>
        <p>Server management UI</p>

        <span class="tag">Panel</span>
        <span class="tag">UI</span>

        <br>
        <button onclick="openLink('https://example.com')">View</button>
      </div>
    </div>

  </div>

  <button class="back" onclick="goHome()">Back</button>
</div>

<script>

// OPEN LINK
function openLink(url){
  window.open(url,'_blank');
}

// BACK
function goHome(){
  window.location.href = "home.html";
}

// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speedX:Math.random()-0.5,
    speedY:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.speedX;
    p.y+=p.speedY;
    ctx.fillStyle="rgba(255,255,255,0.5)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
