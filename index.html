<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suman Web | Portfolio</title>

<meta name="description" content="Suman Web - Web Developer, Minecraft Server Manager and Thumbnail Designer portfolio.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050505;
  color:white;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  transition:0.5s;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CONTAINER */
.container{
  text-align:center;
}

/* H1 TITLE */
h1{
  font-size:3rem;
  letter-spacing:4px;
  background:linear-gradient(90deg,#ff0000,#7a00ff,#0066ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:15px;
}

/* TYPING TEXT */
.typing{
  font-size:18px;
  opacity:0.8;
  height:25px;
  margin-bottom:40px;
}

/* BUTTON */
.enter-btn{
  padding:15px 40px;
  border-radius:50px;
  border:none;
  font-size:16px;
  color:white;
  cursor:pointer;

  background:linear-gradient(90deg,#ff0000,#7a00ff,#0066ff);
  transition:0.3s;
}

.enter-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px rgba(0,102,255,0.6);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <!-- YOUR H1 (SEO IMPORTANT) -->
  <h1>SUMAN VERSE</h1>

  <div class="typing" id="typing"></div>

  <button class="enter-btn" onclick="enterSite()">Enter</button>
</div>

<script>

// TYPING EFFECT
const text = ["Web Developer", "Minecraft Server Manager", "Thumbnail Designer"];
let i=0, j=0;
let currentText="";
let isDeleting=false;

function type(){
  if(i < text.length){
    if(!isDeleting && j <= text[i].length){
      currentText = text[i].substring(0,j++);
    }else if(isDeleting && j >= 0){
      currentText = text[i].substring(0,j--);
    }

    document.getElementById("typing").innerText = currentText;

    if(j === text[i].length) isDeleting = true;
    if(j === 0){
      isDeleting = false;
      i++;
    }
  }else{
    i=0;
  }

  setTimeout(type,100);
}
type();

// ENTER
function enterSite(){
  document.body.style.opacity = "0";
  setTimeout(()=>{
    window.location.href="home.html";
  },500);
}

// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speedX:Math.random()-0.5,
    speedY:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.speedX;
    p.y+=p.speedY;

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
