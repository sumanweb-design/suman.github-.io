<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome - Suman</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050505;
  color:white;
  overflow:hidden;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CONTAINER */
.container{
  text-align:center;
  padding:20px;
}

/* TYPING TEXT */
h1{
  font-size:3rem;
}

.cursor{
  display:inline-block;
  width:2px;
  height:30px;
  background:white;
  margin-left:5px;
  animation:blink 0.7s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* BUTTON */
button{
  margin-top:30px;
  padding:14px 35px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#ff0000,#0066ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

/* LOADING BAR */
.loader{
  width:200px;
  height:4px;
  background:#222;
  margin:20px auto;
  overflow:hidden;
  border-radius:10px;
  display:none;
}

.loader-bar{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#ff0000,#0066ff);
}

/* MOBILE */
@media(max-width:768px){
  h1{font-size:2rem;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1 id="text"></h1><span class="cursor"></span>
  <div class="loader" id="loader">
    <div class="loader-bar" id="bar"></div>
  </div>
  <button onclick="enter()">Enter</button>
</div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-29.mp3"></audio>

<script>

// TYPING EFFECT
const text = "Welcome to my web";
let i = 0;
function type(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 60);
  }
}
type();

// ENTER FUNCTION
function enter(){
  document.getElementById("clickSound").play();

  const loader = document.getElementById("loader");
  const bar = document.getElementById("bar");

  loader.style.display = "block";

  let width = 0;
  const interval = setInterval(()=>{
    width += 2;
    bar.style.width = width + "%";

    if(width >= 100){
      clearInterval(interval);
      window.location.href = "home.html";
    }
  }, 30);
}

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speedX:Math.random()-0.5,
    speedY:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x += p.speedX;
    p.y += p.speedY;

    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    if(p.x<0||p.x>canvas.width) p.speedX*=-1;
    if(p.y<0||p.y>canvas.height) p.speedY*=-1;
  });

  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
