<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects - Suman</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CONTAINER */
.container{
  padding:80px 20px;
  text-align:center;
}

h1{
  font-size:2.5rem;
  margin-bottom:30px;
  background:linear-gradient(90deg,#ff0000,#7a00ff,#0066ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  margin-bottom:10px;
}

/* IMAGE */
.img-box{
  width:100%;
  height:180px;
  overflow:hidden;
}

.img-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:15px;
}

/* TAGS */
.tag{
  display:inline-block;
  padding:5px 10px;
  margin:3px;
  font-size:12px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
}

/* VIEW BUTTON */
.view-btn{
  width:90%;
  max-width:400px;
  margin:20px auto 40px;
  display:block;

  padding:14px 0;
  border:none;
  border-radius:50px;

  font-size:16px;
  color:white;
  text-align:center;

  background:linear-gradient(90deg,#ff0000,#7a00ff,#0066ff);
  cursor:pointer;
  transition:0.3s;
}

.view-btn:hover{
  transform:scale(1.05);
}

/* GLASS HOME BUTTON */
.home-btn-container{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:60px 0;
}

.glass-btn{
  padding:12px 25px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.glass-btn:hover{
  transform:translateY(-3px) scale(1.05);
  background:rgba(255,255,255,0.15);
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

/* MOBILE */
@media(max-width:768px){
  h1{font-size:2rem;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>My Projects</h1>

  <!-- PROJECT 1 -->
  <div class="card">
    <div class="img-box">
      <img src="images/project1.jpg" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="content">
      <h3>Portfolio Website</h3>
      <p>Modern animated website</p>
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">JS</span>
    </div>
  </div>

  <button class="view-btn" onclick="openLink('https://your-link1.com')">View</button>

  <!-- PROJECT 2 -->
  <div class="card">
    <div class="img-box">
      <img src="images/project2.jpg" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="content">
      <h3>Minecraft Server Panel</h3>
      <p>Server management UI</p>
      <span class="tag">Panel</span>
      <span class="tag">UI</span>
    </div>
  </div>

  <button class="view-btn" onclick="openLink('https://your-link2.com')">View</button>

  <!-- PROJECT 3 -->
  <div class="card">
    <div class="img-box">
      <img src="images/project3.jpg" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="content">
      <h3>Thumbnail Designs</h3>
      <p>Gaming thumbnails & visuals</p>
      <span class="tag">Design</span>
      <span class="tag">Photoshop</span>
    </div>
  </div>

  <button class="view-btn" onclick="openLink('https://your-link3.com')">View</button>

  <!-- HOME BUTTON -->
  <div class="home-btn-container">
    <button class="glass-btn" onclick="goHome()">⬅ Back to Home</button>
  </div>

</div>

<script>

// OPEN LINK
function openLink(url){
  window.open(url,'_blank');
}

// GO HOME
function goHome(){
  window.location.href = "home.html";
}

// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speedX:Math.random()-0.5,
    speedY:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.speedX;
    p.y+=p.speedY;
    ctx.fillStyle="rgba(255,255,255,0.5)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
