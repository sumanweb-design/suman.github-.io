<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Suman</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CONTAINER */
.container{
  padding:80px 20px;
  text-align:center;
}

/* TITLE */
h1{
  font-size:2.5rem;
  margin-bottom:40px;
  background:linear-gradient(90deg,#ff0000,#7a00ff,#0066ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CARD */
.card{
  max-width:320px;
  margin:20px auto;
  padding:25px;

  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);

  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* EMAIL FIX */
.email-text{
  word-break:break-word;
  font-size:16px;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:8px 18px;
  border-radius:20px;
  border:none;
  background:linear-gradient(90deg,#ff0000,#7a00ff,#0066ff);
  color:white;
  cursor:pointer;
}

/* HOME BUTTON */
.home-container{
  display:flex;
  justify-content:center;
  margin-top:40px;
}

.glass-btn{
  padding:12px 25px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.glass-btn:hover{
  transform:translateY(-3px) scale(1.05);
  background:rgba(255,255,255,0.15);
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>Contact Me</h1>

  <!-- EMAIL -->
  <div class="card">
    <h3 class="email-text">kundusuman7232@gmail.com</h3>
    <p>Click to copy</p>
    <button class="btn" onclick="copyEmail(event)">Copy</button>
  </div>

  <!-- WHATSAPP -->
  <div class="card" onclick="openLink('https://wa.me/917699120450')">
    <h3>WhatsApp</h3>
    <p>Chat with me</p>
  </div>

  <!-- DISCORD -->
  <div class="card" onclick="openLink('https://discord.com/users/vortexyrn_playz')">
    <h3>Discord</h3>
    <p>vortexyrn_playz</p>
  </div>

  <!-- HOME BUTTON -->
  <div class="home-container">
    <button class="glass-btn" onclick="goHome()">⬅ Back to Home</button>
  </div>

</div>

<script>

// COPY EMAIL (stop card click)
function copyEmail(e){
  e.stopPropagation();
  navigator.clipboard.writeText("kundusuman7232@gmail.com");
  alert("Email copied!");
}

// OPEN LINKS
function openLink(url){
  window.open(url,'_blank');
}

// GO HOME
function goHome(){
  window.location.href = "home.html";
}

// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speedX:Math.random()-0.5,
    speedY:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.speedX;
    p.y+=p.speedY;

    ctx.fillStyle="rgba(255,255,255,0.5)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
